name: AI Agent - Client Tester
on:
  repository_dispatch:
    types: [run-client-agent]
  schedule:
    - cron: '*/15 * * * *'
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Run
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
        run: python3 agent_scripts/client_agent.py
      - name: Push
        env:
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
        run: |
          git config user.name "client-agent" && git config user.email "bot@nro"
          git remote set-url origin "https://x-access-token:${GH_PUSH_TOKEN}@github.com/kgxxyixgikcgxittixxi-collab/rem5.git"
          git pull --rebase origin main 2>/dev/null || true
          git add agent_results/
          git diff --cached --quiet || git commit -m "[client-agent] $(date -u +%H:%M) [skip ci]" && git push origin main || true
