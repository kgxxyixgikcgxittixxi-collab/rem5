name: Start NRO Server

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-server]

permissions:
  contents: write
  actions: write

jobs:
  start:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mariadb-server default-jdk curl wget netcat-openbsd

      - name: Install bore (free TCP tunnel, no account needed)
        run: |
          curl -sLo /tmp/bore.tgz \
            https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xzf /tmp/bore.tgz -C /usr/local/bin/
          bore --version

      - name: Configure MariaDB TCP + Start
        run: |
          MYSQL_CONF="/etc/mysql/mariadb.conf.d/50-server.cnf"
          if [ -f "$MYSQL_CONF" ]; then
            sudo sed -i 's/^skip-networking/#skip-networking/' "$MYSQL_CONF" || true
            if grep -q "^bind-address" "$MYSQL_CONF"; then
              sudo sed -i 's/^bind-address.*/bind-address = 127.0.0.1/' "$MYSQL_CONF"
            else
              echo "bind-address = 127.0.0.1" | sudo tee -a "$MYSQL_CONF" > /dev/null
            fi
          else
            sudo mkdir -p /etc/mysql/conf.d
            printf '[mysqld]\nbind-address = 127.0.0.1\nskip-networking = 0\n' \
              | sudo tee /etc/mysql/conf.d/tcp-fix.cnf > /dev/null
          fi
          sudo service mariadb start
          sleep 3
          sudo mysqladmin -h 127.0.0.1 -P 3306 ping && echo "TCP OK" || true

      - name: Setup database
        run: |
          sudo mysql -e "CREATE DATABASE IF NOT EXISTS team2026 CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          sudo mysql -e "CREATE USER IF NOT EXISTS 'root'@'127.0.0.1' IDENTIFIED BY '';"
          sudo mysql -e "GRANT ALL PRIVILEGES ON *.* TO 'root'@'127.0.0.1' WITH GRANT OPTION;"
          sudo mysql -e "FLUSH PRIVILEGES;"
          if [ -f "database team2026.sql" ]; then
            sudo mysql team2026 < "database team2026.sql" && echo "DB imported"
          elif [ -f "SRC/sql/nro1.sql" ]; then
            sudo mysql team2026 < "SRC/sql/nro1.sql" && echo "DB imported"
          fi

      - name: Prepare server files
        run: |
          mkdir -p ~/nro_server
          cp -r SRC/dist/. ~/nro_server/
          cp -r SRC/data ~/nro_server/ 2>/dev/null || true
          cp SRC/Config.properties ~/nro_server/

      - name: Start bore tunnel + get public address
        run: |
          # Dùng random port (--port 14445 luôn bị chiếm trên bore.pub)
          # Java fix đã tách server.port (bind) khỏi server.external_port (quảng cáo)
          pkill bore 2>/dev/null || true
          sleep 1
          # bore output lên stderr → dùng 2>&1 để bắt
          bore local 14445 --to bore.pub > /tmp/bore.log 2>&1 &
          BORE_PID=$!
          echo "BORE_PID=$BORE_PID" >> $GITHUB_ENV
          echo "Bore PID: $BORE_PID, chờ kết nối..."

          BORE_PORT=""
          for i in $(seq 1 30); do
            sleep 2
            # bore v0.5.1 in ra: "Listening at bore.pub:XXXXX" hoặc "bore.pub:XXXXX"
            BORE_PORT=$(grep -oE '[0-9]{4,5}$' /tmp/bore.log 2>/dev/null | head -1)
            if [ -z "$BORE_PORT" ]; then
              BORE_PORT=$(grep -oE 'bore\.pub:[0-9]+' /tmp/bore.log 2>/dev/null | head -1 | cut -d: -f2)
            fi
            if [ -n "$BORE_PORT" ]; then
              echo "✅ Bore port tìm thấy ở lần $i: $BORE_PORT"
              break
            fi
            # Kiểm tra bore có còn sống không
            if ! kill -0 $BORE_PID 2>/dev/null; then
              echo "⚠️  Bore died at attempt $i, log:"
              cat /tmp/bore.log
              echo "Thử lại..."
              bore local 14445 --to bore.pub > /tmp/bore.log 2>&1 &
              BORE_PID=$!
            fi
          done

          echo "=== bore.log ==="
          cat /tmp/bore.log

          if [ -z "$BORE_PORT" ]; then
            echo "❌ Không lấy được bore port sau 60 giây"
            exit 1
          fi

          echo "TUNNEL_HOST=bore.pub" >> $GITHUB_ENV
          echo "TUNNEL_PORT=$BORE_PORT" >> $GITHUB_ENV
          echo "✅ Tunnel sẵn sàng: bore.pub:$BORE_PORT → localhost:14445"

      - name: Update Config with tunnel address
        run: |
          # server.port=14445 KHÔNG đổi → Java bind đúng cổng cục bộ
          # server.ip = bore.pub (host tunnel)
          # server.external_port = TUNNEL_PORT (cổng bore quảng cáo cho APK)
          sed -i "s/^server\.ip=.*/server.ip=$TUNNEL_HOST/" ~/nro_server/Config.properties
          # Thêm hoặc cập nhật server.external_port
          if grep -q "^server\.external_port=" ~/nro_server/Config.properties; then
            sed -i "s/^server\.external_port=.*/server.external_port=$TUNNEL_PORT/" ~/nro_server/Config.properties
          else
            echo "server.external_port=$TUNNEL_PORT" >> ~/nro_server/Config.properties
          fi
          echo "=== Config hiện tại ==="
          grep 'server\.ip\|server\.port\|server\.external_port' ~/nro_server/Config.properties
          echo "✅ APK sẽ kết nối: $TUNNEL_HOST:$TUNNEL_PORT | Java bind: 14445"

      - name: Start Java Game Server
        run: |
          cd ~/nro_server
          tail -f /dev/null | nohup java -server -Dfile.encoding=UTF-8 -Xmx512m -Xms256m \
            -jar NgocRongOnline.jar > /tmp/gameserver.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 10
          echo "=== Server log (10s) ==="
          cat /tmp/gameserver.log
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "✅ Server running (PID=$SERVER_PID)"
          else
            echo "❌ Server crashed"
            exit 1
          fi

      - name: Write IP+Port to SERVER_IP.txt
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          printf "HOST=%s\nPORT=%s\nSTATUS=RUNNING\nUPDATED=%s\n" \
            "$TUNNEL_HOST" "$TUNNEL_PORT" "$(date '+%Y-%m-%d %H:%M:%S UTC')" > SERVER_IP.txt
          cat SERVER_IP.txt
          git add SERVER_IP.txt
          git commit -m "Server IP: $TUNNEL_HOST:$TUNNEL_PORT [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep server alive (5h 20m) then auto-chain
        run: |
          echo "✅ Server running at $TUNNEL_HOST:$TUNNEL_PORT"
          RESTART_COUNT=0
          for i in $(seq 1 320); do
            sleep 60
            # Restart Java nếu bị crash
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              RESTART_COUNT=$((RESTART_COUNT + 1))
              echo "⚠️  Server died at minute $i (crash #$RESTART_COUNT), restarting..."
              cd ~/nro_server
              tail -f /dev/null | nohup java -server -Dfile.encoding=UTF-8 -Xmx512m -Xms256m \
                -jar NgocRongOnline.jar >> /tmp/gameserver.log 2>&1 &
              SERVER_PID=$!
            fi
            [ $((i % 30)) -eq 0 ] && echo "[$i/320 min] alive - $(date) - crashes: $RESTART_COUNT"
          done
          echo ">>> Thời gian sắp hết (320 phút), trigger workflow mới..."
        env:
          SERVER_PID: ${{ env.SERVER_PID }}

      - name: Trigger next server run (auto-chain)
        if: always()
        run: |
          echo ">>> Khởi động workflow kế tiếp để duy trì server 24/7..."
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/start-server.yml/dispatches" \
            -d '{"ref":"main"}' && echo "✅ Workflow tiếp theo đã được trigger" \
            || echo "⚠️  Trigger thất bại (sẽ có watchdog xử lý)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
