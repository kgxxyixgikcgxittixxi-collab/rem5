name: AI Agent - Server Monitor
on:
  repository_dispatch:
    types: [run-server-agent]
  schedule:
    - cron: '*/5 * * * *'
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - name: Run
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
        run: python3 agent_scripts/server_agent.py
      - name: Push
        env:
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
        run: |
          git config user.name "server-agent" && git config user.email "bot@nro"
          git remote set-url origin "https://x-access-token:${GH_PUSH_TOKEN}@github.com/kgxxyixgikcgxittixxi-collab/rem5.git"
          git pull --rebase origin main 2>/dev/null || true
          git add agent_results/
          git diff --cached --quiet || git commit -m "[server-agent] $(date -u +%H:%M) [skip ci]" && git push origin main || true
