name: AI Agent - Client JAR Tester

on:
  repository_dispatch:
    types: [run-client-agent]
  schedule:
    - cron: '*/15 * * * *'   # mỗi 15 phút
  workflow_dispatch:

concurrency:
  group: client-agent
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test-client:
    runs-on: ubuntu-latest
    timeout-minutes: 13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Test client JAR connection
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import socket, time, json, os, struct, hashlib, urllib.request, datetime, subprocess, glob

          # ── 1. Đọc host/port hiện tại ──────────────────────────────────────
          host = "bore.pub"
          port = 20446
          try:
              with open("SERVER_IP.txt") as f:
                  for line in f:
                      k, _, v = line.strip().partition("=")
                      if k == "HOST": host = v
                      elif k == "PORT": port = int(v)
          except Exception as e:
              print(f"[WARN] SERVER_IP.txt: {e}")

          print(f"[INFO] Testing client → {host}:{port}")

          # ── 2. Kiểm tra JAR client trong repo ──────────────────────────────
          jar_files = sorted(glob.glob("attached_assets/nrmod*.jar") + glob.glob("attached_assets/nro-client*.zip"))
          jar_info = f"Found: {jar_files[-3:] if jar_files else 'none'}"
          print(f"[INFO] JAR: {jar_info}")

          # ── 3. Full protocol handshake simulation ──────────────────────────
          # NRO J2ME client flow (theo phân tích byte):
          # Step 1: TCP connect
          # Step 2: Đọc 4 bytes server key/challenge
          # Step 3: Gửi login packet: [len_hi][len_lo][cmd=0x01][...data...]
          # Step 4: Đọc response command

          test_results = {}
          issues = []

          def test_phase(name, fn):
              try:
                  result = fn()
                  test_results[name] = {"ok": True, "data": result}
                  print(f"  ✅ {name}: {str(result)[:80]}")
                  return result
              except Exception as e:
                  test_results[name] = {"ok": False, "error": str(e)}
                  issues.append(f"{name}: {e}")
                  print(f"  ❌ {name}: {e}")
                  return None

          # Phase 1: DNS resolve
          def dns_check():
              ip = socket.gethostbyname(host)
              return f"{host} → {ip}"
          test_phase("DNS resolve", dns_check)

          # Phase 2: TCP connect
          sock = None
          def tcp_connect():
              global sock
              s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              s.settimeout(10)
              t0 = time.time()
              s.connect((host, port))
              ms = int((time.time()-t0)*1000)
              sock = s
              return f"{ms}ms"
          tcp_result = test_phase("TCP connect", tcp_connect)

          if sock:
              # Phase 3: Đọc server key (4 bytes đầu)
              server_key_bytes = None
              def read_server_key():
                  global server_key_bytes
                  sock.settimeout(8)
                  data = b""
                  deadline = time.time() + 8
                  while len(data) < 4 and time.time() < deadline:
                      try:
                          chunk = sock.recv(4 - len(data))
                          if not chunk: break
                          data += chunk
                      except socket.timeout:
                          break
                  if not data:
                      raise Exception("Server không gửi gì sau khi connect")
                  server_key_bytes = data
                  return f"0x{data.hex()} ({len(data)} bytes)"
              test_phase("Read server key", read_server_key)

              # Phase 4: Gửi login attempt (username + password test)
              def send_login():
                  # NRO login packet structure (command 1):
                  # [2 bytes big-endian length][command byte][username\0][password\0]
                  username = b"test_agent"
                  password = b"test123"
                  payload = bytes([0x01]) + username + b"\x00" + password + b"\x00"
                  pkt_len = len(payload)
                  packet = struct.pack(">H", pkt_len) + payload
                  sock.settimeout(5)
                  sock.sendall(packet)
                  # Đọc response
                  resp = b""
                  try:
                      resp = sock.recv(64)
                  except socket.timeout:
                      pass
                  return f"sent {len(packet)}B, got {len(resp)}B: 0x{resp.hex()[:32]}"
              test_phase("Login attempt", send_login)

              try: sock.close()
              except: pass

          # Phase 5: Kiểm tra JAR integrity (nếu có)
          def check_jar():
              if not jar_files:
                  raise Exception("Không tìm thấy JAR file trong repo")
              latest = jar_files[-1]
              size = os.path.getsize(latest)
              if size < 10000:
                  raise Exception(f"JAR quá nhỏ: {size} bytes")
              # Chạy jar manifest check
              result = subprocess.run(
                  ["jar", "tf", latest],
                  capture_output=True, text=True, timeout=10
              )
              classes = [l for l in result.stdout.split("\n") if l.endswith(".class")]
              return f"{latest} ({size//1024}KB, {len(classes)} classes)"
          test_phase("JAR integrity", check_jar)

          # ── 4. AI phân tích ────────────────────────────────────────────────
          api_key = os.environ.get("AGNES_API_KEY", "")
          diagnosis = "AI không khả dụng"

          if api_key:
              failed_phases = [k for k, v in test_results.items() if not v["ok"]]
              ok_phases     = [k for k, v in test_results.items() if v["ok"]]

              # Phân tích chi tiết server key nếu có
              key_detail = ""
              if "Read server key" in test_results and test_results["Read server key"]["ok"]:
                  key_hex = test_results["Read server key"]["data"]
                  key_detail = f"\nServer key hex: {key_hex}"
              elif "Read server key" in test_results:
                  key_detail = f"\nServer key ERROR: {test_results['Read server key']['error']}"

              prompt = f"""Bạn là chuyên gia reverse-engineering NRO (Ngọc Rồng Online) J2ME game.

Test kết nối client → server bore.pub:{port}:
✅ Phase OK: {', '.join(ok_phases) if ok_phases else 'none'}
❌ Phase FAIL: {', '.join(failed_phases) if failed_phases else 'none'}

Chi tiết:
{key_detail}
Login response: {test_results.get('Login attempt', {}).get('data') or test_results.get('Login attempt', {}).get('error', 'N/A')}
JAR: {test_results.get('JAR integrity', {}).get('data') or test_results.get('JAR integrity', {}).get('error', 'N/A')}

Phân tích (tối đa 150 từ):
1. Client có kết nối được server không?
2. Server key/greeting có đúng format NRO không?  
3. Login packet có được server accept không?
4. Lỗi cụ thể + cách fix?"""

              try:
                  payload = json.dumps({
                      "model": "gpt-4o-mini",
                      "messages": [{"role": "user", "content": prompt}],
                      "max_tokens": 400,
                      "temperature": 0.3
                  }).encode()
                  req = urllib.request.Request(
                      "https://apihub.agnes-ai.com/v1/chat/completions",
                      data=payload,
                      headers={
                          "Authorization": f"Bearer {api_key}",
                          "Content-Type": "application/json"
                      },
                      method="POST"
                  )
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      ai_resp = json.loads(resp.read())
                      diagnosis = ai_resp["choices"][0]["message"]["content"].strip()
                      print(f"\n[AI DIAGNOSIS]\n{diagnosis}")
              except Exception as e:
                  diagnosis = f"AI error: {e}"
                  print(f"[WARN] AI error: {e}")

          # ── 5. Ghi kết quả ─────────────────────────────────────────────────
          os.makedirs("agent_results", exist_ok=True)
          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")
          all_ok = all(v["ok"] for v in test_results.values())
          status_emoji = "✅" if all_ok else ("⚠️" if test_results.get("TCP connect", {}).get("ok") else "❌")

          report = {
              "timestamp": now,
              "target": f"{host}:{port}",
              "status": "OK" if all_ok else "ISSUES",
              "test_results": test_results,
              "issues": issues,
              "ai_diagnosis": diagnosis
          }

          with open("agent_results/client_test.json", "w") as f:
              json.dump(report, f, ensure_ascii=False, indent=2)

          log_line = f"{now} | {status_emoji} bore:{port} | issues={len(issues)} | {diagnosis[:80]}\n"
          with open("agent_results/client_log.txt", "a") as f:
              f.write(log_line)

          # Giữ log <= 300 dòng
          try:
              with open("agent_results/client_log.txt") as f:
                  lines = f.readlines()
              if len(lines) > 300:
                  with open("agent_results/client_log.txt", "w") as f:
                      f.writelines(lines[-300:])
          except: pass

          print(f"\n[DONE] {status_emoji} issues={len(issues)}")
          PYEOF

      - name: Push results
        run: |
          git config user.name "NRO Client Agent"
          git config user.email "client-agent@nro.test"
          git remote set-url origin "https://x-access-token:${GH_PUSH_TOKEN}@github.com/kgxxyixgikcgxittixxi-collab/rem5.git"
          git pull --rebase origin main 2>/dev/null || true
          git add agent_results/ || true
          git diff --cached --quiet && echo "No changes" || git commit -m "[client-agent] $(date -u '+%H:%M UTC') [skip ci]" && git push origin main
        env:
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
